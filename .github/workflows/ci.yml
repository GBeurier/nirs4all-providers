name: Providers CI

on:
  pull_request:
  push:
    branches:
      - main
      - "rc/**"

permissions:
  contents: read

jobs:
  gate:
    name: ruff / typecheck / tests / conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Check out canonical ecosystem contracts
        uses: actions/checkout@v7
        with:
          repository: GBeurier/nirs4all-ecosystem
          ref: main
          path: nirs4all-ecosystem

      - name: Check out dataset backing
        uses: actions/checkout@v7
        with:
          repository: GBeurier/nirs4all-datasets
          ref: main
          path: nirs4all-datasets

      - name: Check out IO backing
        uses: actions/checkout@v7
        with:
          repository: GBeurier/nirs4all-io
          ref: main
          path: nirs4all-io

      - name: Check out repository backing
        uses: actions/checkout@v7
        with:
          repository: GBeurier/nirs4all-repository
          ref: main
          path: nirs4all-repository

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Install provider backing dependencies
        run: |
          python -m pip install \
            "nirs4all-datasets>=0.3.2" \
            "nirs4all-io>=0.1.5"
          python -m pip install -e ./nirs4all-repository

      - name: Run providers gate
        env:
          N4A_WORKSPACE_ROOT: ${{ github.workspace }}
        run: python scripts/ci_gate.py
