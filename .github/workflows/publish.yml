name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = build only (no publish)"
        type: string
        default: "true"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'release' || github.event.release.prerelease == false
    steps:
      - uses: actions/checkout@v7

      - name: Check out canonical ecosystem contracts
        uses: actions/checkout@v7
        with:
          repository: GBeurier/nirs4all-ecosystem
          ref: main
          path: nirs4all-ecosystem

      - name: Check out provider backings
        uses: actions/checkout@v7
        with:
          repository: GBeurier/nirs4all-datasets
          ref: main
          path: nirs4all-datasets

      - uses: actions/checkout@v7
        with:
          repository: GBeurier/nirs4all-repository
          ref: main
          path: nirs4all-repository

      - uses: actions/checkout@v7
        with:
          repository: GBeurier/nirs4all-formats
          ref: main
          path: nirs4all-formats

      - uses: actions/checkout@v7
        with:
          repository: GBeurier/nirs4all-io
          ref: main
          path: nirs4all-io

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install release gate dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install \
            -e ./nirs4all-datasets \
            -e ./nirs4all-repository \
            "nirs4all-io>=0.1.5"

      - name: Verify release tag matches package version
        if: github.event_name == 'release' && github.event.release.prerelease == false
        run: python -m nirs4all_providers.version_sync --json

      - name: Run providers CI/release gate
        env:
          N4A_WORKSPACE_ROOT: ${{ github.workspace }}
        run: python scripts/ci_gate.py

      - name: Run local backing release gate
        run: python -m nirs4all_providers.local_release_gate --workspace-root "$GITHUB_WORKSPACE" --json

      - name: Build sdist + wheel
        run: |
          python -m build
      - name: Smoke-check the wheel
        run: |
          python -m pip install dist/*.whl
          nirs4all-providers-release-gate --help
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'release' && github.event.release.prerelease == false) || inputs.dry_run == 'false'
    environment:
      name: pypi
      url: https://pypi.org/p/nirs4all-providers
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Validate Trusted Publisher release tuple
        run: |
          set -euo pipefail
          expected_repo="GBeurier/nirs4all-providers"
          if [[ "${GITHUB_REPOSITORY}" != "${expected_repo}" ]]; then
            echo "::error::PyPI Trusted Publisher for project nirs4all-providers must target owner=GBeurier repo=nirs4all-providers workflow=publish.yml environment=pypi; current repository is ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi
          case "${GITHUB_WORKFLOW_REF}" in
            */.github/workflows/publish.yml@*)
              ;;
            *)
              echo "::error::Expected GITHUB_WORKFLOW_REF to point at .github/workflows/publish.yml, got ${GITHUB_WORKFLOW_REF}." >&2
              exit 1
              ;;
          esac
      - uses: pypa/gh-action-pypi-publish@release/v1
